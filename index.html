<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Área entre dos curvas - Ejercicios</title>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$','$$']]
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f8;
    margin:0;
}

header{

background:#1f4e79;
color:white;
padding:25px;
text-align:center;

}

.container{

width:90%;
max-width:1000px;
margin:auto;
padding:30px;

}

.card{

background:white;
padding:25px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);

}

button{

background:#1f4e79;
color:white;
border:none;
padding:10px 18px;
border-radius:5px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#163a5b;

}

.respuesta{

display:none;
margin-top:20px;
padding:15px;
background:#eef5ff;
border-left:5px solid #1f4e79;

}

</style>

</head>

<body>

<header>

<h1>Área entre dos Curvas</h1>

<p>Banco de ejercicios</p>

</header>

<div class="container">

<div class="card">

<h2>Ejercicio 1</h2>

<p>Encuentra el área entre las siguientes curvas:</p>

$$ 
y=x^2-4
$$
  
y 
  
$$ 
y=x+16
$$

<button onclick="mostrar('r1')">

Mostrar respuesta

</button>

<div id="r1" class="respuesta">

$$ 
\frac{243}{2}= 121.5 
$$ 

Unidades cuadradas.

</div>

</div>

<div class="card">

<h2>Ejercicio 2</h2>

<p>Encuentra el área entre las siguientes curvas:</p>

$$
y=x^2
$$ 
y 
$$ 
y= \sqrt{x}
$$

<button onclick="mostrar('r2')">

Mostrar respuesta

</button>

<div id="r2" class="respuesta">

$$
A=\frac{1}{3}
$$

</div>

</div>

</div>

<script>

function mostrar(id){

let r=document.getElementById(id);

if(r.style.display==="block"){

r.style.display="none";

}else{

r.style.display="block";

MathJax.typeset();

}

}

</script>

</body>
</html>
