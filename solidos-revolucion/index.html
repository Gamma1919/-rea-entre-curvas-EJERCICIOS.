<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banco de Ejercicios | Sólidos de Revolución</title>

<link rel="stylesheet" href="style.css">

<script>
MathJax = {
    tex: {
        inlineMath: [['\\(','\\)'],['$','$']]
    }
};
</script>

<script defer
src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<style>

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 40px;
    border-bottom:2px solid #ddd;
}

.titulo h1{
    margin:0;
    font-size:34px;
}

.titulo h2{
    margin:5px 0 0;
    font-size:22px;
    font-weight:normal;
    color:#555;
}

.logo{
    font-size:60px;
    font-weight:bold;
    color:#000;
    letter-spacing:4px;
}

.herramientas{
    padding:20px 40px;
}

#buscador{
    width:100%;
    max-width:500px;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

#contenedorEjercicios{
    padding:20px 40px;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
    border-top:1px solid #ddd;
    color:#666;
}

</style>

</head>

<body>

<header>

<div class="titulo">
    <h1>Banco de Ejercicios</h1>
    <h2>Sólidos de Revolución</h2>
</div>

<div class="logo">
    MAGM
</div>

</header>

<section class="herramientas">

<input
type="text"
id="buscador"
placeholder="Buscar ejercicio...">

</section>

<section id="contenedorEjercicios">

</section>

<footer>

<p>
© 2026 Banco de ejercicios de Cálculo Integral
</p>

</footer>

<script src="script.js"></script>

</body>
</html>
